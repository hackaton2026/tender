version: "3.8"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: tender-app
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-tender}:${POSTGRES_PASSWORD:-tender_dev_password}@postgres:5432/${POSTGRES_DB:-tender}
      # Expo Web defaults to port 8081
      PORT: ${APP_PORT:-8081}
    ports:
      - "${APP_PORT:-8081}:8081"
    networks:
      - tender-network
    volumes:
      - .:/app
      - node_modules:/app/node_modules

  postgres:
    image: postgres:16-alpine
    container_name: tender-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tender}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tender_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-tender}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tender-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tender}"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  tender-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  node_modules:
    driver: local
