version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: tender-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tender}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tender_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-tender}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - tender-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tender}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: tender-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: postgresql://${POSTGRES_USER:-tender}:${POSTGRES_PASSWORD:-tender_dev_password}@postgres:5432/${POSTGRES_DB:-tender}
      PORT: ${API_PORT:-3001}
      # Add other API-specific environment variables here
    ports:
      - "${API_PORT:-3001}:3001"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tender-network
    volumes:
      - ./api:/app/api
      - ./shared:/app/shared
      - node_modules:/app/node_modules
      - api-build:/app/dist

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: tender-app
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_URL: http://api:${API_PORT:-3001}
      PORT: ${APP_PORT:-3000}
      # Add other app-specific environment variables here
    ports:
      - "${APP_PORT:-3000}:3000"
    depends_on:
      - api
    networks:
      - tender-network
    volumes:
      - ./app:/app/app
      - ./shared:/app/shared
      - node_modules:/app/node_modules
      - app-build:/app/build

networks:
  tender-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  node_modules:
    driver: local
  api-build:
    driver: local
  app-build:
    driver: local
